# TérangaTable — nginx vhost for host system
# Copy to /etc/nginx/sites-available/terangatable.cloud
# then: sudo ln -s /etc/nginx/sites-available/terangatable.cloud /etc/nginx/sites-enabled/
# then: sudo certbot --nginx -d terangatable.cloud -d www.terangatable.cloud -d api.terangatable.cloud
# then: sudo nginx -s reload

# Frontend — terangatable.cloud
server {
    listen 80;
    server_name terangatable.cloud www.terangatable.cloud;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API — api.terangatable.cloud
server {
    listen 80;
    server_name api.terangatable.cloud;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

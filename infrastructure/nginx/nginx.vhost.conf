# TérangaTable — nginx vhost for host system
# Copy to /etc/nginx/sites-available/terangatable.cloud
# then: sudo ln -s /etc/nginx/sites-available/terangatable.cloud /etc/nginx/sites-enabled/
# then: sudo mkdir -p /var/www/letsencrypt
# then: sudo certbot certonly --webroot -w /var/www/letsencrypt \
#         -d terangatable.cloud -d www.terangatable.cloud -d api.terangatable.cloud \
#         --email innosoftcreation@gmail.com --agree-tos --non-interactive
# then: sudo nginx -s reload

# Frontend — terangatable.cloud
server {
    listen 80;
    listen [::]:80;
    server_name terangatable.cloud www.terangatable.cloud;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name terangatable.cloud www.terangatable.cloud;

    ssl_certificate     /etc/letsencrypt/live/terangatable.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terangatable.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API — api.terangatable.cloud
server {
    listen 80;
    listen [::]:80;
    server_name api.terangatable.cloud;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.terangatable.cloud;

    ssl_certificate     /etc/letsencrypt/live/terangatable.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terangatable.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

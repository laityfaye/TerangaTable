events { worker_connections 1024; }

http {
  server {
    listen 80;
    server_name terangatable.cloud www.terangatable.cloud api.terangatable.cloud;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 200 'TérangaTable — certbot verification in progress';
      add_header Content-Type text/plain;
    }
  }
}

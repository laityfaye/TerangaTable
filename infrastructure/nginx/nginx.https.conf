events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - [$time_local] "$request" $status '
                  '$body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile    on;
  tcp_nopush  on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  upstream api { server api:3001; keepalive 32; }
  upstream web { server web:3000; keepalive 32; }

  # ── HTTP → HTTPS redirect (also serves certbot renewal challenges) ──────────
  server {
    listen 80;
    server_name terangatable.cloud www.terangatable.cloud api.terangatable.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Web frontend: terangatable.cloud + www ───────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name terangatable.cloud www.terangatable.cloud;

    ssl_certificate     /etc/letsencrypt/live/terangatable.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terangatable.cloud/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    client_max_body_size 20M;

    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── API backend: api.terangatable.cloud ──────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name api.terangatable.cloud;

    ssl_certificate     /etc/letsencrypt/live/terangatable.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terangatable.cloud/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    client_max_body_size 100M;

    # Socket.IO WebSocket upgrade
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    location / {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
